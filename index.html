<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>親子の食ボード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f7f7f5; max-width: 480px; margin: 0 auto; min-height: 100vh; }

  /* ── スプラッシュ ── */
  #splash { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(160deg,#fff9f4,#f0f7ff); }
  .splash-box { text-align: center; padding: 32px; width: 100%; max-width: 360px; }
  .splash-icon { font-size: 56px; margin-bottom: 12px; }
  .splash-title { font-size: 26px; font-weight: 800; color: #1a1a1a; margin-bottom: 6px; }
  .splash-sub { font-size: 14px; color: #888; margin-bottom: 32px; }
  .role-row { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; }
  .role-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 20px 24px; border: 2px solid; border-radius: 20px; background: #fff; cursor: pointer; width: 145px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .role-btn-child { border-color: #4a90d9; }
  .role-btn-parent { border-color: #e85d4a; }
  .role-btn-emoji { font-size: 36px; }
  .role-btn-name { font-size: 15px; font-weight: 800; color: #1a1a1a; }
  .role-btn-desc { font-size: 11px; color: #888; line-height: 1.6; text-align: center; }
  .splash-note { font-size: 11px; color: #bbb; }

  /* ── ヘッダー ── */
  header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #fff; border-bottom: 2.5px solid; position: sticky; top: 0; z-index: 10; }
  .header-left { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 800; color: #1a1a1a; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .role-chip { font-size: 12px; color: #fff; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
  .switch-btn { font-size: 12px; color: #888; background: #f0f0f0; border: none; border-radius: 12px; padding: 4px 10px; cursor: pointer; }

  /* ── タブ ── */
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #eee; }
  .tab { flex: 1; padding: 11px 0; font-size: 12px; font-weight: 700; color: #aaa; background: none; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; position: relative; }
  .tab.active { border-bottom-color: var(--theme); color: var(--theme); }
  .tab-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 17px; height: 17px; border-radius: 9px; color: #fff; font-size: 10px; font-weight: 800; padding: 0 4px; margin-left: 4px; vertical-align: middle; }

  /* ── 凡例 ── */
  .legend { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: #fff; border-bottom: 1px solid #f0f0f0; font-size: 11px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; color: #666; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .pending-badge { margin-left: auto; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }

  /* ── コンテンツ ── */
  .content { padding: 10px; }
  .load-wrap { display: flex; justify-content: center; align-items: center; height: 200px; color: #aaa; font-size: 14px; }

  /* ── 週ナビ ── */
  .week-nav { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; margin-bottom: 8px; }
  .nav-btn { font-size: 13px; color: #555; background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 5px 12px; cursor: pointer; }
  .week-label { font-size: 13px; font-weight: 700; color: #333; display: flex; align-items: center; gap: 6px; }
  .now-badge { font-size: 10px; color: #fff; border-radius: 10px; padding: 2px 7px; }

  /* ── グリッド ── */
  .grid { display: grid; grid-template-columns: 34px repeat(7, 1fr); gap: 2px; }
  .day-header { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px 2px; text-align: center; color: #555; font-size: 11px; font-weight: 800; }
  .day-num { font-size: 9px; margin-top: 1px; opacity: 0.8; }
  .meal-lbl { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; color: #999; text-align: center; line-height: 1.5; }
  .cell { min-height: 54px; border: 1.5px solid #e8e8e8; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px; cursor: pointer; transition: all 0.15s; overflow: hidden; background: #fff; }
  .cell.proposed { background: #fffbeb; border-color: #f59e0b; }
  .cell.confirmed { background: #ecfdf5; border-color: #10b981; }
  .cell.skip { background: #f1f5f9; border-color: #cbd5e1; }
  .cell-status { font-size: 9px; font-weight: 800; }
  .cell-menu { font-size: 10px; text-align: center; word-break: break-all; line-height: 1.3; }
  .cell-empty { font-size: 16px; color: #ddd; }
  .hint { text-align: center; font-size: 11px; color: #bbb; margin-top: 10px; }

  /* ── カード ── */
  .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .card-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .card-title { font-size: 18px; font-weight: 800; color: #1a1a1a; }
  .card-hint { font-size: 12px; color: #aaa; margin-bottom: 14px; margin-top: 4px; }
  textarea { width: 100%; border-radius: 10px; border: 1.5px solid #e0e0e0; padding: 12px; font-size: 14px; color: #333; resize: vertical; font-family: inherit; outline: none; }
  .save-btn { margin-top: 12px; width: 100%; padding: 13px 0; border-radius: 12px; border: none; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }

  /* ── モーダル ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal-box { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 480px; }
  .modal-title { font-size: 15px; font-weight: 800; color: #1a1a1a; text-align: center; margin-bottom: 8px; }
  .modal-sub { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 10px; }
  .modal-input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; font-size: 16px; outline: none; font-family: inherit; }
  .modal-btns { display: flex; gap: 8px; margin-top: 10px; }
  .btn-cancel { flex: 1; padding: 11px 0; border-radius: 10px; border: 1px solid #ddd; background: #f5f5f5; font-size: 13px; color: #666; cursor: pointer; }
  .btn-propose { flex: 1; padding: 11px 0; border-radius: 10px; border: none; background: #f59e0b; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-confirm { flex: 1; padding: 11px 0; border-radius: 10px; border: none; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-accept { margin-top: 6px; padding: 9px 12px; border-radius: 8px; border: 1.5px solid; background: #fff; font-size: 12px; font-weight: 700; cursor: pointer; width: 100%; }
  .proposed-box { background: #fffbeb; border: 1.5px solid #f59e0b; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px; }
  .proposed-label { font-size: 11px; color: #92400e; font-weight: 700; }
  .proposed-menu { font-size: 17px; color: #78350f; font-weight: 700; }
  .confirmed-notice { display: flex; align-items: center; gap: 8px; background: #ecfdf5; border: 1.5px solid #10b981; border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; font-size: 13px; color: #065f46; font-weight: 600; }
  .skip-notice { background: #f1f5f9; border: 1.5px solid #cbd5e1; border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; font-size: 13px; color: #64748b; text-align: center; }
  .skip-row { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .skip-row-label { font-size: 11px; color: #aaa; }
  .btn-skip { padding: 6px 12px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f1f5f9; font-size: 11px; color: #64748b; cursor: pointer; }
  .btn-reset { width: 100%; margin-top: 8px; padding: 10px 0; border-radius: 10px; border: none; background: #f5f5f5; color: #999; font-size: 12px; cursor: pointer; }

  /* ── トースト ── */
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 24px; border-radius: 24px; font-size: 13px; z-index: 200; white-space: nowrap; pointer-events: none; }

  /* ── カレンダー購読ボタン ── */
  .cal-subscribe-wrap { text-align: center; margin-top: 10px; }
  .cal-subscribe-btn { display: inline-block; font-size: 12px; font-weight: 700; padding: 7px 20px; border-radius: 20px; border: 1.5px solid; text-decoration: none; background: #fff; }

  .hidden { display: none !important; }
</style>
</head>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ════════════════════════════════
// Firebase 初期化
// ════════════════════════════════
const app = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(app);

// ════════════════════════════════
// 状態管理
// ════════════════════════════════
const DAYS_JP = ["日","月","火","水","木","金","土"];
const SKIP_LABELS = {
  skip_child:  { label: "子食事なし", color: "#94a3b8" },
  skip_parent: { label: "親食事なし", color: "#94a3b8" },
  skip_both:   { label: "食事なし",   color: "#94a3b8" },
};

let role = null;
let themeColor = "#4a90d9";
let weekOffset = 0;
let currentData = {};
let currentShopping = "";
let currentConditions = "";
let currentTab = "week";
let weekBadge = 0, shoppingBadge = 0, conditionsBadge = 0;
let prevData = null, prevShopping = null, prevConditions = null;
let isFirstLoad = true;

// ════════════════════════════════
// Firebase リアルタイム監視
// ════════════════════════════════
function startListening() {
  const dbRef = ref(db, "shokuboard");
  onValue(dbRef, (snapshot) => {
    const d = snapshot.val() || {};
    const newData = d.meals || {};
    const newShopping = d.shopping || "";
    const newConditions = d.conditions || "";

    if (isFirstLoad) {
      // 初回はバッジなし
      currentData = newData;
      currentShopping = newShopping;
      currentConditions = newConditions;
      prevData = JSON.stringify(newData);
      prevShopping = newShopping;
      prevConditions = newConditions;
      isFirstLoad = false;
      renderAll();
      return;
    }

    // 差分検知してバッジ更新
    const newDataStr = JSON.stringify(newData);
    if (newDataStr !== prevData) {
      const old = JSON.parse(prevData || "{}");
      let count = 0;
      Object.keys(newData).forEach(key => {
        const o = old[key] || {};
        const n = newData[key] || {};
        if (n.status !== o.status && n.status && n.status !== "none") count++;
      });
      prevData = newDataStr;
      currentData = newData;
      if (count > 0 && currentTab !== "week") {
        weekBadge += count;
        updateBadges();
      }
    }

    if (newShopping !== prevShopping) {
      prevShopping = newShopping;
      currentShopping = newShopping;
      if (currentTab !== "shopping") {
        shoppingBadge++;
        updateBadges();
      }
      if (currentTab === "shopping") renderShopping();
    }

    if (newConditions !== prevConditions) {
      prevConditions = newConditions;
      currentConditions = newConditions;
      if (currentTab !== "conditions") {
        conditionsBadge++;
        updateBadges();
      }
      if (currentTab === "conditions") renderConditions();
    }

    renderWeekGrid();
  });
}

// ════════════════════════════════
// Firebase 保存
// ════════════════════════════════
async function saveToFirebase(meals, shopping, conditions) {
  try {
    await set(ref(db, "shokuboard"), { meals, shopping, conditions });
    // 自分の変更はバッジ対象外にするためprevを更新
    prevData = JSON.stringify(meals);
    prevShopping = shopping;
    prevConditions = conditions;
    showToast("保存しました ✓");
  } catch(e) {
    showToast("保存に失敗しました");
    console.error(e);
  }
}

// ════════════════════════════════
// Discord 通知
// ════════════════════════════════
async function sendDiscord(title, description, color) {
  try {
    await fetch(DISCORD_WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        embeds: [{
          title: `🍱 ${title}`,
          description: `${description}\n\n[▶ アプリを開く](${APP_URL})`,
          color,
          footer: { text: "親子の食ボード" },
          timestamp: new Date().toISOString(),
        }]
      })
    });
  } catch(e) {
    console.warn("Discord通知失敗:", e);
  }
}

// ════════════════════════════════
// 日付ユーティリティ
// ════════════════════════════════
function getWeekDates(offset = 0) {
  const today = new Date();
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - day + 1 + offset * 7);
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function dispDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function isToday(d) { return fmtDate(d) === fmtDate(new Date()); }
function isWeekend(d) { return d.getDay()===0 || d.getDay()===6; }

// ════════════════════════════════
// レンダリング
// ════════════════════════════════
function renderAll() {
  if (!role) { showSplash(); return; }
  hideSplash();
  renderHeader();
  renderTabs();
  renderContent();
}

function showSplash() {
  document.getElementById("splash").classList.remove("hidden");
  document.getElementById("main-app").classList.add("hidden");
}
function hideSplash() {
  document.getElementById("splash").classList.add("hidden");
  document.getElementById("main-app").classList.remove("hidden");
}

function renderHeader() {
  const header = document.getElementById("main-header");
  header.style.borderBottomColor = themeColor;
  document.getElementById("role-chip").textContent = role === "child" ? "👦 子供" : "👩‍🍳 親";
  document.getElementById("role-chip").style.background = themeColor;

  // カレンダー購読ボタン（CALENDAR_URLが設定されている場合のみ表示）
  const calBtn = document.getElementById("cal-subscribe-btn");
  if (CALENDAR_URL) {
    const webcalUrl = CALENDAR_URL.replace(/^https?:\/\//, "webcal://");
    calBtn.href = webcalUrl;
    calBtn.style.borderColor = themeColor;
    calBtn.style.color = themeColor;
    calBtn.classList.remove("hidden");
  } else {
    calBtn.classList.add("hidden");
  }
}

function renderTabs() {
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === currentTab);
    t.style.setProperty("--theme", themeColor);
  });
  updateBadges();
}

function updateBadges() {
  setBadge("badge-week", weekBadge);
  setBadge("badge-shopping", shoppingBadge);
  setBadge("badge-conditions", conditionsBadge);
}

function setBadge(id, count) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = count;
  el.style.background = themeColor;
  el.classList.toggle("hidden", count === 0);
}

function renderContent() {
  ["week","shopping","conditions"].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle("hidden", currentTab !== t);
  });
  if (currentTab === "week") renderWeekGrid();
  if (currentTab === "shopping") renderShopping();
  if (currentTab === "conditions") renderConditions();
}

function renderWeekGrid() {
  const dates = getWeekDates(weekOffset);
  const grid = document.getElementById("meal-grid");
  if (!grid) return;

  // 週ラベル
  const wl = document.getElementById("week-label-text");
  if (wl && dates.length) {
    wl.textContent = `${dispDate(dates[0])} 〜 ${dispDate(dates[6])}`;
  }
  const nowBadge = document.getElementById("now-badge");
  if (nowBadge) {
    nowBadge.classList.toggle("hidden", weekOffset !== 0);
    nowBadge.style.background = themeColor;
  }

  // 承諾待ち件数
  const pending = Object.values(currentData).filter(c => c.status === "proposed").length;
  const pb = document.getElementById("pending-badge");
  if (pb) {
    pb.textContent = `承諾待ち ${pending}件`;
    pb.style.background = themeColor;
    pb.classList.toggle("hidden", pending === 0);
  }

  // グリッド再構築
  grid.innerHTML = "";

  // コーナー
  grid.appendChild(el("div", {}));

  // 曜日ヘッダー
  dates.forEach(d => {
    const isWknd = isWeekend(d);
    const isTdy = isToday(d);
    const div = el("div", { className: "day-header" });
    if (isTdy) { div.style.background = themeColor; div.style.color = "#fff"; div.style.borderRadius = "8px"; }
    else if (isWknd) { div.style.color = d.getDay()===0 ? "#e85d4a" : "#4a90d9"; }
    div.innerHTML = `<span>${DAYS_JP[d.getDay()]}</span><span class="day-num">${dispDate(d)}</span>`;
    grid.appendChild(div);
  });

  // 昼食・夕食行
  ["lunch","dinner"].forEach(type => {
    const lbl = el("div", { className: "meal-lbl" });
    lbl.innerHTML = type === "lunch" ? "🌞<br>昼食" : "🌙<br>夕食";
    grid.appendChild(lbl);
    dates.forEach(d => {
      const key = `${fmtDate(d)}_${type}`;
      const cell = currentData[key] || {};
      const status = cell.status || "none";
      const isSkip = status.startsWith("skip_");
      const div = el("div", { className: "cell" + (status==="confirmed"?" confirmed":status==="proposed"?" proposed":isSkip?" skip":"") });
      if (status === "confirmed") {
        div.innerHTML = `<span class="cell-status" style="color:#10b981">✓ 確定</span><span class="cell-menu" style="color:#065f46;font-weight:600">${esc(cell.menu||"")}</span>`;
      } else if (status === "proposed") {
        div.innerHTML = `<span class="cell-status" style="color:#f59e0b">提案中</span><span class="cell-menu" style="color:#78350f">${esc(cell.menu||"")}</span>`;
      } else if (isSkip) {
        const info = SKIP_LABELS[status];
        div.innerHTML = `<span class="cell-menu" style="color:${info.color}">${info.label}</span>`;
      } else {
        div.innerHTML = `<span class="cell-empty">＋</span>`;
      }
      div.onclick = () => openModal(key, cell);
      grid.appendChild(div);
    });
  });
}

function renderShopping() {
  const ta = document.getElementById("shopping-textarea");
  if (ta) ta.value = currentShopping;
}

function renderConditions() {
  const ta = document.getElementById("conditions-textarea");
  if (ta) ta.value = currentConditions;
}

// ════════════════════════════════
// モーダル
// ════════════════════════════════
let modalKey = null;
let modalCell = null;

function openModal(key, cell) {
  modalKey = key;
  modalCell = cell;
  const status = cell.status || "none";
  const isSkip = status.startsWith("skip_");
  const [dateStr, type] = key.split("_");
  const d = new Date(dateStr);
  const typeLabel = type==="lunch" ? "🌞 昼食" : "🌙 夕食";

  document.getElementById("modal-title").textContent = `${dispDate(d)}（${DAYS_JP[d.getDay()]}）${typeLabel}`;
  document.getElementById("modal-input").value = cell.menu || "";

  // 各ブロック
  const confirmedNotice = document.getElementById("modal-confirmed-notice");
  const proposedBox = document.getElementById("modal-proposed-box");
  const skipNotice = document.getElementById("modal-skip-notice");
  const inputSection = document.getElementById("modal-input-section");
  const skipRowEl = document.getElementById("modal-skip-row");
  const modalSub = document.getElementById("modal-sub");

  confirmedNotice.classList.toggle("hidden", status !== "confirmed");
  proposedBox.classList.toggle("hidden", status !== "proposed");
  skipNotice.classList.toggle("hidden", !isSkip);
  inputSection.classList.toggle("hidden", isSkip);
  skipRowEl.classList.toggle("hidden", isSkip);

  if (status === "proposed") {
    document.getElementById("proposed-menu-text").textContent = cell.menu || "";
    document.getElementById("btn-accept").style.borderColor = themeColor;
    document.getElementById("btn-accept").style.color = themeColor;
  }
  if (!isSkip) {
    modalSub.textContent = status==="confirmed" ? "メニューを変更する場合は入力してください" :
      status==="proposed" ? "別のメニューを提案・確定する場合" : "メニューを提案または確定";
  }

  document.getElementById("btn-confirm").style.background = themeColor;
  document.getElementById("btn-accept").style.borderColor = themeColor;
  document.getElementById("btn-accept").style.color = themeColor;

  const resetBtn = document.getElementById("btn-reset");
  resetBtn.classList.toggle("hidden", status === "none");

  document.getElementById("modal-overlay").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.add("hidden");
  modalKey = null;
  modalCell = null;
}

async function doPropose() {
  const menu = document.getElementById("modal-input").value.trim();
  if (!menu) return;
  const newData = { ...currentData, [modalKey]: { menu, status: "proposed" } };
  currentData = newData;
  await saveToFirebase(newData, currentShopping, currentConditions);
  const [dateStr, type] = modalKey.split("_");
  const d = new Date(dateStr);
  const who = role === "child" ? "👦 子供" : "👩‍🍳 親";
  const typeLabel = type==="lunch"?"昼食":"夕食";
  await sendDiscord(
    "メニューが提案されました",
    `${who}が **${dispDate(d)}（${DAYS_JP[d.getDay()]}）${typeLabel}** に「**${menu}**」を提案しました。\n承諾するにはアプリを確認してください。`,
    0xf59e0b
  );
  closeModal();
  renderWeekGrid();
}

async function doConfirm() {
  const menu = document.getElementById("modal-input").value.trim();
  if (!menu) return;
  const newData = { ...currentData, [modalKey]: { menu, status: "confirmed" } };
  currentData = newData;
  await saveToFirebase(newData, currentShopping, currentConditions);
  const [dateStr, type] = modalKey.split("_");
  const d = new Date(dateStr);
  const who = role === "child" ? "👦 子供" : "👩‍🍳 親";
  const typeLabel = type==="lunch"?"昼食":"夕食";
  await sendDiscord(
    "献立が確定しました",
    `${who}が **${dispDate(d)}（${DAYS_JP[d.getDay()]}）${typeLabel}** を「**${menu}**」に確定しました。`,
    0x10b981
  );
  closeModal();
  renderWeekGrid();
}

async function doAccept() {
  const menu = modalCell.menu;
  const newData = { ...currentData, [modalKey]: { menu, status: "confirmed" } };
  currentData = newData;
  await saveToFirebase(newData, currentShopping, currentConditions);
  const [dateStr, type] = modalKey.split("_");
  const d = new Date(dateStr);
  const who = role === "child" ? "👦 子供" : "👩‍🍳 親";
  const typeLabel = type==="lunch"?"昼食":"夕食";
  await sendDiscord(
    "提案が承諾されました",
    `${who}が **${dispDate(d)}（${DAYS_JP[d.getDay()]}）${typeLabel}** の「**${menu}**」を承諾・確定しました。`,
    0x10b981
  );
  closeModal();
  renderWeekGrid();
}

async function doSkip(skipType) {
  const newData = { ...currentData, [modalKey]: { status: skipType } };
  currentData = newData;
  await saveToFirebase(newData, currentShopping, currentConditions);
  const [dateStr, type] = modalKey.split("_");
  const d = new Date(dateStr);
  const who = role === "child" ? "👦 子供" : "👩‍🍳 親";
  const typeLabel = type==="lunch"?"昼食":"夕食";
  const skipLabel = SKIP_LABELS[skipType]?.label || "食事なし";
  await sendDiscord(
    "食事なしに設定されました",
    `${who}が **${dispDate(d)}（${DAYS_JP[d.getDay()]}）${typeLabel}** を「${skipLabel}」に設定しました。`,
    0x94a3b8
  );
  closeModal();
  renderWeekGrid();
}

async function doReset() {
  const newData = { ...currentData, [modalKey]: {} };
  currentData = newData;
  await saveToFirebase(newData, currentShopping, currentConditions);
  closeModal();
  renderWeekGrid();
}

async function doSaveShopping() {
  const val = document.getElementById("shopping-textarea").value;
  currentShopping = val;
  await saveToFirebase(currentData, val, currentConditions);
  const who = role === "child" ? "👦 子供" : "👩‍🍳 親";
  await sendDiscord(
    "買い物リストが更新されました",
    `${who}が買い物リストを更新しました。`,
    0x4a90d9
  );
}

async function doSaveConditions() {
  const val = document.getElementById("conditions-textarea").value;
  currentConditions = val;
  await saveToFirebase(currentData, currentShopping, val);
  const who = role === "child" ? "👦 子供" : "👩‍🍳 親";
  await sendDiscord(
    "リクエスト条件が更新されました",
    `${who}がリクエスト条件を更新しました。`,
    0x8b5cf6
  );
}

// ════════════════════════════════
// ユーティリティ
// ════════════════════════════════
function el(tag, props) {
  const e = document.createElement(tag);
  Object.assign(e, props);
  return e;
}
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("hidden");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add("hidden"), 2500);
}

// ════════════════════════════════
// イベント設定
// ════════════════════════════════
window.addEventListener("DOMContentLoaded", () => {

  // ロール選択
  document.getElementById("btn-role-child").onclick = () => {
    role = "child"; themeColor = "#4a90d9";
    startListening();
    renderAll();
  };
  document.getElementById("btn-role-parent").onclick = () => {
    role = "parent"; themeColor = "#e85d4a";
    startListening();
    renderAll();
  };
  document.getElementById("btn-switch").onclick = () => {
    role = null; weekBadge = 0; shoppingBadge = 0; conditionsBadge = 0;
    isFirstLoad = true;
    renderAll();
  };

  // タブ
  document.querySelectorAll(".tab").forEach(t => {
    t.onclick = () => {
      currentTab = t.dataset.tab;
      if (currentTab==="week") weekBadge = 0;
      if (currentTab==="shopping") shoppingBadge = 0;
      if (currentTab==="conditions") conditionsBadge = 0;
      renderTabs();
      renderContent();
    };
  });

  // 週ナビ
  document.getElementById("btn-prev-week").onclick = () => { weekOffset--; renderWeekGrid(); };
  document.getElementById("btn-next-week").onclick = () => { weekOffset++; renderWeekGrid(); };

  // モーダル
  document.getElementById("modal-overlay").onclick = (e) => { if(e.target===e.currentTarget) closeModal(); };
  document.getElementById("btn-propose").onclick = doPropose;
  document.getElementById("btn-confirm").onclick = doConfirm;
  document.getElementById("btn-accept").onclick = doAccept;
  document.getElementById("btn-cancel").onclick = closeModal;
  document.getElementById("btn-reset").onclick = doReset;
  document.getElementById("btn-skip-self").onclick = () => doSkip(role==="child"?"skip_child":"skip_parent");
  document.getElementById("btn-skip-both").onclick = () => doSkip("skip_both");

  // 保存
  document.getElementById("btn-save-shopping").onclick = doSaveShopping;
  document.getElementById("btn-save-conditions").onclick = doSaveConditions;
});
</script>
